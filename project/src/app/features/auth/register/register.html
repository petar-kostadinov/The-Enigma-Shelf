<div class="login-container">
  <div class="login-box">
    <h2>Join the Enigma</h2>
    <p>Create your key to the hidden library</p>

    <form>
      <div class="input-group">
        <label>Username</label>
        <input type="text" name="name" placeholder="username" required />
      </div>

      <div class="input-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="your@email.com" required />
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required />
      </div>

      <div class="input-group">
        <label>Repeat Password</label>
        <input type="password" name="rePassword" placeholder="••••••••" required />
      </div>

      <button type="submit" class="login-btn">Create Account</button>

      <div class="login-footer">
        <span>Already have a key?</span>
        <a routerLink="/login" class="register-link">Back to Login</a>
      </div>
    </form>
  </div>
</div>
