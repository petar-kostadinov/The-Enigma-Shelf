<div class="login-container">
  <div class="login-box">
    <h2>Welcome Back</h2>
    <p>Enter the library of enigmas</p>

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
      <div class="input-group">
        <label>Email</label>
        <input appInputError type="email" placeholder="your@email.com" formControlName="email" />
        @if (loginForm.get('email')?.invalid && loginForm.get('email')?.touched) {
          <p class="error">Enter a valid email</p>
        }
      </div>

      <div class="input-group">
        <label>Password</label>
        <input appInputError type="password" placeholder="••••••••" formControlName="password" />
        @if (loginForm.get('password')?.invalid && loginForm.get('password')?.touched) {
          <p class="error">Password is required</p>
        }
      </div>

      <button type="submit" class="login-btn" [disabled]="loginForm.invalid || isLoading()"
      >
        {{ isLoading() ? 'Logging in...' : 'Login' }}
      </button>

      <div class="login-footer">
        <span>Not a member yet?</span>
        <a routerLink="/register" class="register-link">Create an Account</a>
      </div>
    </form>
  </div>
</div>
