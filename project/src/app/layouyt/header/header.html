<div class="navbar">
  <a routerLink="/home" class="logo-badge" aria-label="The Enigma Shelf — Home">
    <span class="logo-badge__icon" aria-hidden="true">🕵️‍♂️</span>
    <span class="logo-badge__text">
      <span class="logo-badge__title">The Enigma Shelf</span>
      <span class="logo-badge__tagline">Books · Mysteries · Archives</span>
    </span>
  </a>

  <div class="nav-links">
    <a routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
      >Home</a
    >
    <a routerLink="/books" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
      >Books</a
    >
    @if (authService.userSignal()) {
      <a
        routerLink="/books/add"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        >Add Book</a
      >
    }
    <a routerLink="/about" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
      >About</a
    >
  </div>
  <div class="nav-right">
    <app-search />
    @if (authService.userSignal(); as user) {
      <div class="auth-buttons">
        <details class="nav-profile" #profileMenu>
          <summary
            class="profile-link"
            [attr.aria-label]="'Open profile menu, signed in as ' + user.username"
            [attr.title]="user.username"
          >
            <svg
              class="profile-link__icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
          </summary>
          <div class="nav-profile__panel" role="group" aria-label="Profile menu (preview)">
            <a routerLink="/account" class="nav-profile__item" (click)="closeProfileMenu(profileMenu)"
              >Account</a
            >
            <a
              routerLink="/my-books"
              class="nav-profile__item"
              (click)="closeProfileMenu(profileMenu)"
              >My books</a
            >
          </div>
        </details>
        <a (click)="onLogout()" class="logout-link">Logout</a>
      </div>
    } @else {
      <div class="auth-buttons">
        <a routerLink="/login" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
          >Login</a
        >
        <a
          routerLink="/register"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          >Register</a
        >
      </div>
    }
  </div>
</div>
